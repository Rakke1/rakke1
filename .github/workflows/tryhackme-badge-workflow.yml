name: Update TryHackMe Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: p4p1/tryhackme-badge-workflow@main
        with:
          username: "yeiazel"
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
