name: Update TryHackMe Stats

on:
  schedule:
    # This runs every day at midnight. You can change the timing if you like.
    - cron: '0 0 * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate THM Stats
        uses: jmgis/tryhackme-stats-action@v1
        with:
          # Your TryHackMe username
          username: "yeiazel"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update TryHackMe stats" || exit 0
          git push
